<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Starting Lineup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Starting Lineup</h1>

  <form id="lineup-form">
    <fieldset>
      <legend>Status:</legend>
      <p>
        <input type="radio" id="status-draft" name="status" value="Draft">
        <label for="status-draft">Draft</label>
        <input type="radio" id="status-final" name="status" value="Final" checked>
        <label for="status-final">Final</label>
      </p>
    </fieldset>

    <p>
      <label for="game-date">Date:</label>
      <select id="game-date" name="gameDate">
        <option value="March 20">March 20</option>
        <option value="March 24">March 24</option>
        <option value="April 2">April 2</option>
        <option value="April 6">April 6</option>
        <option value="April 13">April 13</option>
      </select>
    </p>

    <fieldset>
      <legend>Players:</legend>
      <p>
        <input type="checkbox" id="player-aarav" name="players" value="Aarav Agarwal">
        <label for="player-aarav">Aarav Agarwal</label><br>
        <input type="checkbox" id="player-ava" name="players" value="Ava Johnson">
        <label for="player-ava">Ava Johnson</label><br>
        <input type="checkbox" id="player-julio" name="players" value="Julio Ortiz">
        <label for="player-julio">Julio Ortiz</label><br>
        <input type="checkbox" id="player-liam" name="players" value="Liam Rubio">
        <label for="player-liam">Liam Rubio</label><br>
        <input type="checkbox" id="player-emma" name="players" value="Emma Witherspoon">
        <label for="player-emma">Emma Witherspoon</label>
      </p>
    </fieldset>

    <p>
      <input id="submit-lineup" type="submit" value="Submit">
    </p>
  </form>

  <p id="lineup-output"></p>

  <script src="script.js"></script>
</body>
</html>
